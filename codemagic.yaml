workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: regpulse

    environment:
      xcode: latest
      node: 22
      vars:
        BUNDLE_ID: com.regpulse.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install dependencies
        script: |
          npm install --ignore-scripts
          # Force install packages that npm sometimes skips in CI
          npm install \
            @capacitor/preferences@8.0.1 \
            @capacitor/local-notifications@8.0.2 \
            @aparajita/capacitor-biometric-auth@10.0.0 \
            --ignore-scripts --no-save --legacy-peer-deps
          npx patch-package

      - name: Build web assets and sync Capacitor
        script: npm run build:cap

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create

      - name: Add certificate to keychain
        script: keychain add-certificates

      - name: Apply signing to Xcode project
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
