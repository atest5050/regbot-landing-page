workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: regpulse

    environment:
      xcode: latest
      node: 22
      groups:
        - regpulse
      vars:
        BUNDLE_ID: com.regpulse.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install dependencies
        script: |
          npm install --ignore-scripts
          # Force install packages that npm sometimes skips in CI
          npm install \
            @capacitor/preferences@8.0.1 \
            @capacitor/local-notifications@8.0.2 \
            @aparajita/capacitor-biometric-auth@10.0.0 \
            --ignore-scripts --no-save --legacy-peer-deps
          npx patch-package

      - name: Build web assets and sync Capacitor
        script: npm run build:cap

      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 -D > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $CM_PROVISIONING_PROFILE | base64 -D > "$PROFILES_HOME/profile.mobileprovision"

      - name: Apply signing to Xcode project
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
